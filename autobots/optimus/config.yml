agents:
  defaults:
    workspace: "./workspace"
    model: "openai/gpt-4.1-mini"
    # model: "anthropic/claude-sonnet-4-6"
    # model: "deepseek/deepseek-chat"
    max_tokens: 4096
    temperature: 0.7
    memory_window: 50  # Number of messages before consolidation (0 = disabled)

providers:
  openai:
    api_key: "${OPENAI_API_KEY}"
  # anthropic:
  #   api_key: "${ANTHROPIC_API_KEY}"

channels:
  telegram:
    enabled: true
    streaming: true
    token: "${TELEGRAM_BOT_TOKEN}"
    allow_from: ["your-username"]
    custom_commands:
      macros:
        summarize:
          prompt: "Summarize our conversation in 3 bullet points"
          description: "Summarize the conversation"
        translate:
          prompt: "Translate the following to English"
          description: "Translate text to English"

  slack:
    enabled: false
    bot_token: "${SLACK_BOT_TOKEN}"
    app_token: "${SLACK_APP_TOKEN}"
    mode: "socket"
    allow_from: ["*"]
    group_policy: "mention"  # "mention" | "open" | "allowlist"
    dm:
      enabled: true
      policy: "open"

# MCP servers — connect external tools via Model Context Protocol
# mcp:
#   servers:
#     my-server:
#       command: "uvx"
#       args: ["my-mcp-server"]
#       env:
#         API_KEY: "${MY_API_KEY}"

tools:
  image:
    enabled: true
    provider: openai
    model: gpt-image-1
    size: 1024x1024
  web:
    search:
      api_key: "${BRAVE_API_KEY}"
      max_results: 5
  sandbox: "auto"
  # docker_image: autobot-sandbox  # Uncomment to use custom sandbox image
  exec:
    timeout: 60

gateway:
  host: "127.0.0.1"
  port: 18790
